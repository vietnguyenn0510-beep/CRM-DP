<style>

        }
    </style>
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body class="h-full bg-on-surface">

<!-- Login Content -->

<div class="glass-card w-full max-w-[440px] rounded-3xl p-xl flex flex-col items-center">

<span class="font-body-lg text-body-lg text-on-surface font-semibold">Đăng ký bằng Google</span>
</button>
<!-- Divider -->
<div class="w-full flex items-center gap-md mb-lg">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-md text-label-md text-secondary">Hoặc đăng ký bằng email</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>

<!-- Login Form -->
<form class="w-full space-y-md" onsubmit="event.preventDefault();">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-secondary px-xs">Họ và tên</label>

<div class="space-y-xs">
<label class="font-label-md text-label-md text-secondary px-xs">Email</label>
<input class="w-full h-input-h px-md rounded-[14px] border border-outline-variant bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-lg text-body-lg" placeholder="example@dinhphong.vn" type="email"/>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-md text-label-md text-secondary">Mật khẩu</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<input class="w-full h-input-h px-md rounded-[14px] border border-outline-variant bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-lg text-body-lg" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-secondary hover:text-primary" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button onclick="window.location.href='index.html'" class="w-full h-input-h rounded-[14px] butcher-gradient text-white font-body-lg text-body-lg font-bold shadow-lg hover:brightness-110 active:scale-[0.98] transition-all duration-200 mt-md">
Đăng ký
</button>
</form>
<!-- Footer -->
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-secondary">
                    Đã có tài khoản? 
                    <a class="text-primary font-semibold hover:underline" href="index.html">Đăng nhập</a>
</p>
</div>
</div>
<!-- System Branding Info (Subtle) -->
<div class="absolute bottom-md text-white/40 font-label-md text-label-md">
            © 2024 Đỉnh Phong Luxury. All rights reserved.
        </div>
</main>
<script>
        // Simple micro-interaction for input focus effects
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Add a parallax-ish move to the glass card on mouse move
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
</body></html>
